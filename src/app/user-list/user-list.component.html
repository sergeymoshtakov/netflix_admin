<div>
    <button (click)="startAdding()">Add New User</button>
    <div *ngFor="let user of users; let i = index">
      <app-user
        [user]="user"
        (edit)="startEditing(user, i)"
        (delete)="deleteUser(i)"
      ></app-user>
      <hr />
    </div>
    <app-user-edit
      *ngIf="isEditorVisible"
      [user]="currentUser"
      [isEditMode]="isEditMode"
      (save)="saveUser($event)"
      (cancelEdit)="cancelEdit()"
    ></app-user-edit>
</div>
