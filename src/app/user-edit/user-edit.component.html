<div>
    <div>
      <h3>{{ isEditMode ? 'Edit User' : 'Add User' }}</h3>
      <form class="user-form" (ngSubmit)="saveUser(userForm)" #userForm="ngForm">
        <div>
          <label for="firstName">First Name</label>
          <input
            [(ngModel)]="user.firstName"
            name="firstName"
            class="form-control"
            id="firstName"
            required
            #firstName="ngModel"
          />
          <div *ngIf="firstName.invalid && firstName.touched" class="text-danger">
            First Name is required.
          </div>
        </div>
        
        <div>
          <label for="lastName">Last Name</label>
          <input
            [(ngModel)]="user.lastName"
            name="lastName"
            class="form-control"
            id="lastName"
            required
            #lastName="ngModel"
          />
          <div *ngIf="lastName.invalid && lastName.touched" class="text-danger">
            Last Name is required.
          </div>
        </div>
        
        <div>
          <label for="registrationDate">Registration Date</label>
          <input
            [(ngModel)]="user.registrationDate"
            name="registrationDate"
            class="form-control"
            type="date"
            id="registrationDate"
            [max]="today"
            required
            #registrationDate="ngModel"
          />
          <div *ngIf="registrationDate.invalid && registrationDate.touched" class="text-danger">
            <div *ngIf="registrationDate.errors?.['required']">Registration Date is required.</div>
            <div *ngIf="registrationDate.errors?.['max']">Date cannot be in the future.</div>
          </div>
        </div>
        <p></p>
        <button type="submit" [disabled]="userForm.invalid">
          {{ isEditMode ? 'Save Changes' : 'Add User' }}
        </button>
        <p></p>
        <button type="button" (click)="cancel()">Cancel</button>
      </form>
    </div>
  </div>
