<div class="card mb-3">
    <div class="card-body">
      <h5 class="card-title">{{ user.firstName }} {{ user.lastName }}</h5>
      <p class="card-text">
        <strong>Registration Date:</strong> {{ user.registrationDate | date }}
      </p>
      <button class="btn btn-warning" (click)="edit.emit()">Edit</button>
      <button class="btn btn-danger" (click)="delete.emit()">Delete</button>
    </div>
</div>
